services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - VECTORDB_PROVIDER=qdrant
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
    depends_on:
      - qdrant

  qdrant:
    image: docker.io/qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
